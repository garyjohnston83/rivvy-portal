server:
  port: 9090
  servlet:
    session:
      timeout: 30m

management:
  endpoints:
    web:
      exposure:
        include: health

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rivvy_portal
    username: rivvy
    password: rivvy
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
